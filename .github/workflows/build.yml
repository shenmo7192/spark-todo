name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux amd64 deb
        run: npx electron-builder --linux deb --x64 -p never

      - name: Build Linux arm64 deb
        run: npx electron-builder --linux deb --arm64 -p never

      - name: Upload amd64 deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-deb
          path: dist/*amd64.deb
          if-no-files-found: error

      - name: Upload arm64 deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-deb
          path: dist/*arm64.deb
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows amd64 NSIS
        run: npx electron-builder --win nsis --x64 -p never

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-nsis
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs: [build-linux-deb, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
