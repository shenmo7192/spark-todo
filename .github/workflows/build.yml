name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux
            artifact_name: linux-amd64-deb
          - os: ubuntu-22.04-arm
            arch: arm64
            target: linux
            artifact_name: linux-arm64-deb
          - os: windows-latest
            arch: x64
            target: win
            artifact_name: windows-amd64-nsis

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux amd64 deb
        if: matrix.target == 'linux' && matrix.arch == 'x64'
        run: npx electron-builder --linux deb --x64 -p never

      - name: Build Linux arm64 deb
        if: matrix.target == 'linux' && matrix.arch == 'arm64'
        run: npx electron-builder --linux deb --arm64 -p never

      - name: Build Windows amd64 NSIS
        if: matrix.target == 'win'
        run: npx electron-builder --win nsis --x64 -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.{deb,exe}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
